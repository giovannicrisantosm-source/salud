<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuesta de Salud</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .formulario {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            width: 380px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
        }

        h2 {
            text-align: center;
            color: #4b0082;
            margin-bottom: 20px;
            font-size: 28px;
        }

        label {
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #d1d1d1;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 15px;
            transition: 0.3s;
        }

        input:focus,
        select:focus {
            border-color: #764ba2;
            outline: none;
            box-shadow: 0 0 8px rgba(118, 75, 162, 0.5);
        }

        .range-value {
            text-align: center;
            margin-top: 10px;
            color: #764ba2;
            font-weight: bold;
            font-size: 18px;
        }

        input[type="range"] {
            accent-color: #764ba2;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 25px;
            background: linear-gradient(135deg, #764ba2, #667eea);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 17px;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.03);
            opacity: 0.9;
        }

        #mensaje {
            text-align: center;
            color: #1b8a3e;
            margin-top: 18px;
            font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>

<body>

    <div class="formulario">
        <h2>Encuesta de Salud</h2>

        <form id="formEncuesta">

            <!-- Edad -->
            <label for="edad">Edad:</label>
            <input type="number" id="edad" name="edad" min="1" max="120" required>

            <!-- Peso -->
            <label for="peso">Peso (kg):</label>
            <input type="number" id="peso" name="peso" min="20" max="300" required>

            <!-- Nivel de dolor -->
            <label for="dolor">Nivel de dolor:</label>
            <input type="range" id="dolor" name="dolor" min="0" max="10" value="5"
                   oninput="valorDolor.textContent = this.value">

            <div class="range-value">
                Nivel: <span id="valorDolor">5</span>
            </div>

            <!-- Tipo de sangre -->
            <label for="sangre">Tipo de sangre:</label>
            <select id="sangre" name="sangre" required>
                <option value="">Selecciona una opción</option>
                <option value="A+">A+</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B-">B-</option>
                <option value="AB+">AB+</option>
                <option value="AB-">AB-</option>
                <option value="O+">O+</option>
                <option value="O-">O-</option>
            </select>

            <!-- Botón -->
            <button type="submit">Enviar Encuesta</button>

            <!-- Mensaje -->
            <div id="mensaje"></div>

        </form>
    </div>

    <script>
        const formulario = document.getElementById("formEncuesta");
        const mensaje = document.getElementById("mensaje");

        formulario.addEventListener("submit", function(event) {
            event.preventDefault();
            mensaje.textContent = "Encuesta enviada correctamente";
        });
    </script>

</body>
</html>
